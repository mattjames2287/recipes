<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bari Family Cook Book</title>

<style>
body{
  margin:0;
  font-family:Georgia,serif;
  background:url('assets/kitchen-bg.png') center/cover no-repeat;
}

/* BETTER BOOK ALIGNMENT */
.book-wrap{
  position:absolute;
  top:62%;
  left:50%;
  transform:translate(-50%,-50%) scale(1.25) skewX(-4deg);
  width:min(85vw,1100px);
  aspect-ratio:1.8/1;
}

.book{
  background:rgba(255,255,255,0.95);
  border-radius:20px;
  padding:20px;
  box-shadow:0 20px 50px rgba(0,0,0,0.3);
}

h1{
  margin:0;
}

.controls{
  margin-top:10px;
}

button{
  padding:10px 15px;
  border:none;
  border-radius:20px;
  cursor:pointer;
}

.flip{background:black;color:white;}

/* CATEGORY PILLS */
.categories{
  position:absolute;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.categories button{
  background:white;
  border-radius:20px;
  padding:8px 14px;
  border:1px solid #ddd;
}

/* MOBILE FIX */
@media(max-width:700px){
  .book-wrap{
    top:auto;
    bottom:20px;
    transform:translateX(-50%) scale(1);
  }
}
</style>
</head>

<body>

<div class="categories">
  <button>All</button>
  <button>Breakfast</button>
  <button>Lunch</button>
  <button>Dinner</button>
  <button>Dessert</button>
  <button>Snacks</button>
  <button>Drinks</button>
</div>

<div class="book-wrap">
  <div class="book">
    <h1>Bari Family Cook Book</h1>
    <p>Fresh, simple, flip-through recipes right on the counter.</p>

    <img src="https://images.unsplash.com/photo-1528207776546-365bb710ee93" style="width:100%;border-radius:12px;margin-top:10px;">

    <h2>Blueberry Pancakes</h2>
    <p>Fluffy pancakes with juicy blueberries.</p>

    <div class="controls">
      <button>← Prev</button>
      <button class="flip">Flip</button>
      <button>Next →</button>
    </div>
  </div>
</div>

</body>
</html>
